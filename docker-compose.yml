version: '3.8'

services:
  # MongoDB for data persistence
  mongodb:
    image: mongo:7
    container_name: entropy-prime-mongodb
    restart: always
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: entropy_prime
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - entropy-prime-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # FastAPI Backend with Orchestration
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: "3.11"
    container_name: entropy-prime-backend
    restart: always
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      MONGODB_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/entropy_prime?authSource=admin
      MONGODB_DB_NAME: entropy_prime
      EP_SESSION_SECRET: ${EP_SESSION_SECRET}
      EP_SHADOW_SECRET: ${EP_SHADOW_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTHONUNBUFFERED: "1"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - entropy-prime-net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  entropy-prime-net:
    driver: bridge

volumes:
  mongodb_data:
  mongodb_config:

